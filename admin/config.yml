backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: de

collections:
  - name: "content"
    label: "Website Inhalte"
    files:

      - name: "deutsch"
        label: "🇩🇪 Deutsch – Texte bearbeiten"
        file: "content-de.json"
        fields:
          - { name: hero_eyebrow,    label: "Hero – Kleiner Text oben",  widget: string }
          - { name: hero_h1,         label: "Hero – Hauptüberschrift",    widget: string, hint: "HTML erlaubt, z.B. <em>Text</em>" }
          - { name: hero_p,          label: "Hero – Untertitel",          widget: text }
          - { name: hero_btn1,       label: "Hero – Button Termin",       widget: string }
          - { name: hero_btn2,       label: "Hero – Button Über mich",    widget: string }

          - { name: welcome_eyebrow, label: "Willkommen – Kleiner Text",  widget: string }
          - { name: welcome_h2,      label: "Willkommen – Überschrift",   widget: string }
          - { name: welcome_p1,      label: "Willkommen – Absatz 1",      widget: text }
          - { name: welcome_p2,      label: "Willkommen – Absatz 2",      widget: text }
          - { name: welcome_p3,      label: "Willkommen – Absatz 3",      widget: text }
          - { name: welcome_p4,      label: "Willkommen – Absatz 4",      widget: text }
          - { name: welcome_p5,      label: "Willkommen – Absatz 5",      widget: text }
          - { name: welcome_p6,      label: "Willkommen – Absatz 6",      widget: text }

          - { name: services_eyebrow,   label: "Angebot – Kleiner Text",     widget: string }
          - { name: services_h2,        label: "Angebot – Überschrift",      widget: string }
          - { name: services_p,         label: "Angebot – Einleitung",       widget: text }
          - { name: services_card1_h3,  label: "Karte 1 – Titel",            widget: string }
          - { name: services_card1_p,   label: "Karte 1 – Beschreibung",     widget: text }
          - { name: services_card2_h3,  label: "Karte 2 – Titel",            widget: string }
          - { name: services_card2_p,   label: "Karte 2 – Beschreibung",     widget: text }
          - { name: services_card3_h3,  label: "Karte 3 – Titel",            widget: string }
          - { name: services_card3_p,   label: "Karte 3 – Beschreibung",     widget: text }

          - { name: phil_quote,      label: "Zitat",                      widget: text }
          - { name: phil_cite,       label: "Zitat – Autorin",            widget: string }

          - { name: aboutT_eyebrow,  label: "Über mich – Kleiner Text",   widget: string }
          - { name: aboutT_h2,       label: "Über mich – Name",           widget: string }
          - { name: aboutT_p1,       label: "Über mich – Absatz 1",       widget: text }
          - { name: aboutT_p2,       label: "Über mich – Absatz 2",       widget: text }
          - { name: aboutT_btn,      label: "Über mich – Button",         widget: string }

          - { name: testi_eb,        label: "Bewertungen – Kleiner Text", widget: string }
          - { name: testi_h2,        label: "Bewertungen – Überschrift",  widget: string }
          - { name: testi_q1,        label: "Bewertung 1 – Text",         widget: text }
          - { name: testi_c1,        label: "Bewertung 1 – Name",         widget: string }
          - { name: testi_q2,        label: "Bewertung 2 – Text",         widget: text }
          - { name: testi_c2,        label: "Bewertung 2 – Name",         widget: string }

          - { name: cta_h2,          label: "CTA – Überschrift",          widget: string }
          - { name: cta_p,           label: "CTA – Text",                 widget: text }
          - { name: cta_btn1,        label: "CTA – Button 1",             widget: string }
          - { name: cta_btn2,        label: "CTA – Button 2",             widget: string }

          - { name: footer_brand,    label: "Footer – Kurzbeschreibung",  widget: text }
          - { name: footer_copyright,label: "Footer – Copyright",         widget: string }
          - { name: footer_note,     label: "Footer – Hinweis",           widget: string }

      - name: "english"
        label: "🇬🇧 English – Edit texts"
        file: "content-en.json"
        fields:
          - { name: hero_eyebrow,    label: "Hero – Small text top",      widget: string }
          - { name: hero_h1,         label: "Hero – Main headline",       widget: string, hint: "HTML allowed, e.g. <em>Text</em>" }
          - { name: hero_p,          label: "Hero – Subtitle",            widget: text }
          - { name: hero_btn1,       label: "Hero – Button Appointment",  widget: string }
          - { name: hero_btn2,       label: "Hero – Button About",        widget: string }

          - { name: welcome_eyebrow, label: "Welcome – Small text",       widget: string }
          - { name: welcome_h2,      label: "Welcome – Heading",          widget: string }
          - { name: welcome_p1,      label: "Welcome – Paragraph 1",      widget: text }
          - { name: welcome_p2,      label: "Welcome – Paragraph 2",      widget: text }
          - { name: welcome_p3,      label: "Welcome – Paragraph 3",      widget: text }
          - { name: welcome_p4,      label: "Welcome – Paragraph 4",      widget: text }
          - { name: welcome_p5,      label: "Welcome – Paragraph 5",      widget: text }
          - { name: welcome_p6,      label: "Welcome – Paragraph 6",      widget: text }

          - { name: services_eyebrow,   label: "Services – Small text",   widget: string }
          - { name: services_h2,        label: "Services – Heading",      widget: string }
          - { name: services_p,         label: "Services – Intro",        widget: text }
          - { name: services_card1_h3,  label: "Card 1 – Title",          widget: string }
          - { name: services_card1_p,   label: "Card 1 – Description",    widget: text }
          - { name: services_card2_h3,  label: "Card 2 – Title",          widget: string }
          - { name: services_card2_p,   label: "Card 2 – Description",    widget: text }
          - { name: services_card3_h3,  label: "Card 3 – Title",          widget: string }
          - { name: services_card3_p,   label: "Card 3 – Description",    widget: text }

          - { name: phil_quote,      label: "Quote",                      widget: text }
          - { name: phil_cite,       label: "Quote – Author",             widget: string }

          - { name: aboutT_eyebrow,  label: "About – Small text",         widget: string }
          - { name: aboutT_h2,       label: "About – Name",               widget: string }
          - { name: aboutT_p1,       label: "About – Paragraph 1",        widget: text }
          - { name: aboutT_p2,       label: "About – Paragraph 2",        widget: text }
          - { name: aboutT_btn,      label: "About – Button",             widget: string }

          - { name: testi_eb,        label: "Testimonials – Small text",  widget: string }
          - { name: testi_h2,        label: "Testimonials – Heading",     widget: string }
          - { name: testi_q1,        label: "Review 1 – Text",            widget: text }
          - { name: testi_c1,        label: "Review 1 – Name",            widget: string }
          - { name: testi_q2,        label: "Review 2 – Text",            widget: text }
          - { name: testi_c2,        label: "Review 2 – Name",            widget: string }

          - { name: cta_h2,          label: "CTA – Heading",              widget: string }
          - { name: cta_p,           label: "CTA – Text",                 widget: text }
          - { name: cta_btn1,        label: "CTA – Button 1",             widget: string }
          - { name: cta_btn2,        label: "CTA – Button 2",             widget: string }

          - { name: footer_brand,    label: "Footer – Description",       widget: text }
          - { name: footer_copyright,label: "Footer – Copyright",         widget: string }
          - { name: footer_note,     label: "Footer – Note",              widget: string }
